<style>
@keyframes ajj3-spin { from { transform: rotateX(-15deg) rotateY(0deg); } to { transform: rotateX(-15deg) rotateY(360deg); } }
.ajj3-stage { perspective: 900px; width: 180px; height: 180px; }
.ajj3-cube { transform-style: preserve-3d; animation: ajj3-spin 18s linear infinite; position: relative; width: 100%; height: 100%; }
.ajj3-face { position: absolute; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; font-family: var(--font-sans); font-size: 72px; font-weight: 500; color: #FFFFFF; }
</style>
<div style="padding: 40px 0; display: flex; justify-content: center;">
  <div style="background: #0A2540; border-radius: 12px; padding: 60px 80px; display: flex; flex-direction: column; align-items: center; gap: 36px;">
    <div class="ajj3-stage">
      <div class="ajj3-cube">
        <div class="ajj3-face" style="background: #2D8CFF; transform: rotateY(0deg) translateZ(90px);">A</div>
        <div class="ajj3-face" style="background: #1F5894; transform: rotateY(90deg) translateZ(90px);">J</div>
        <div class="ajj3-face" style="background: #0A2540; transform: rotateY(180deg) translateZ(90px); border: 1px solid #1F5894;">J</div>
        <div class="ajj3-face" style="background: #1F5894; transform: rotateY(-90deg) translateZ(90px);">3</div>
        <div class="ajj3-face" style="background: #4DA8FF; transform: rotateX(90deg) translateZ(90px);"></div>
        <div class="ajj3-face" style="background: #0A2540; transform: rotateX(-90deg) translateZ(90px); border: 1px solid #1F5894;"></div>
      </div>
    </div>
    <div style="text-align: center;">
      <div style="color: #FFFFFF; font-family: var(--font-sans); font-size: 36px; letter-spacing: 4px; font-weight: 500;">AJJ<span style="color: #4DA8FF; font-size: 22px; vertical-align: super;">3</span></div>
      <div style="color: #94B3D6; margin-top: 8px; font-family: var(--font-sans); font-size: 12px; font-style: italic; letter-spacing: 1px;">Three disciplines, cubed.</div>
    </div>
  </div>
</div>
