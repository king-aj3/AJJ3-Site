<style>

.ajj3-cube { transform-style: preserve-3d; animation: ajj3-spin 18s linear infinite; position: relative; width: 100%; height: 100%; }

.ajj3-num { color: #0A2540; text-shadow: .03em .03em 0 #06192a, .06em .06em 0 #03101a, .085em .085em 0 #020a12, 0 .16em .16em rgba(0,0,0,.55); animation: ajj3-num-sweep 18s linear infinite; }
@keyframes ajj3-num-sweep {
  0%   { text-shadow: .03em .03em 0 #06192a, .06em .06em 0 #03101a, .085em .085em 0 #020a12, -.22em .11em .16em rgba(0,0,0,.55); }
  25%  { text-shadow: .03em .03em 0 #06192a, .06em .06em 0 #03101a, .085em .085em 0 #020a12,    0 .22em .20em rgba(0,0,0,.62); }
  50%  { text-shadow: .03em .03em 0 #06192a, .06em .06em 0 #03101a, .085em .085em 0 #020a12,  .22em .11em .16em rgba(0,0,0,.55); }
  75%  { text-shadow: .03em .03em 0 #06192a, .06em .06em 0 #03101a, .085em .085em 0 #020a12,    0 .22em .20em rgba(0,0,0,.62); }
  100% { text-shadow: .03em .03em 0 #06192a, .06em .06em 0 #03101a, .085em .085em 0 #020a12, -.22em .11em .16em rgba(0,0,0,.55); }
}
</style>
